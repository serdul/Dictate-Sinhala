name: Build & Release Wani APK

on:
  push:
    branches:
      - main
      - copilot/**
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wani-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wani-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Android keystore
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.keystore

      - name: Build Release APK
        env:
          RELEASE_STORE_FILE: /tmp/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk wani-${VERSION}.apk
          else
            cp app/build/outputs/apk/release/app-release-unsigned.apk wani-${VERSION}.apk
          fi

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          name: "Wani (වනි) ${{ github.ref_name }}"
          body: |
            ## Wani (වනි) — Sinhala-First Dictation Keyboard
            **ඔබේ හඬ, ඔබේ භාෂාව** — Your voice, your language

            ### What's New
            - Sinhala (සිංහල) language support via Whisper & Gemini AI
            - Output modes: Sinhala Script / Romanized / English
            - Gemini AI support (free tier: 15 req/min, 1M tokens/day)
            - Profession modes: General, Medical, Legal, IT, Custom
            - Custom word dictionary with auto-replacement
            - Floating overlay mic button

            ### Installation
            1. Download `wani-${{ github.ref_name }}.apk` below
            2. Enable "Install from unknown sources" in Android settings
            3. Install the APK
            4. Go to **Settings → System → Languages & Input → Virtual keyboard** and enable Wani
            5. Open any text field and switch to the Wani keyboard

            ### Contact
            Made with ❤️ from Sri Lanka 🇱🇰
            Seran Senevirathna · [WhatsApp](https://wa.me/94712104933)
          files: wani-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
